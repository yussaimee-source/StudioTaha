<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&family=Noto+Serif+Arabic&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070707;color:#fff;font-family:'DM Sans',sans-serif;padding:48px 32px 80px}
  header{text-align:center;margin-bottom:56px}
  header .eyebrow{font-size:.72rem;letter-spacing:.22em;color:rgba(201,168,76,.6);text-transform:uppercase;margin-bottom:14px}
  header h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,3.5vw,3rem);font-weight:800;letter-spacing:-.03em;line-height:1.1}
  header h1 .gold{color:#C9A84C}
  header .arabic{font-family:'Noto Serif Arabic',serif;font-size:1.6rem;color:rgba(201,168,76,.8);margin-top:12px;direction:rtl}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:18px}
  .card{background:#0e0e0e;border:1px solid rgba(201,168,76,.12);border-radius:14px;overflow:hidden;transition:transform .3s,border-color .3s}
  .card:hover{transform:translateY(-5px);border-color:rgba(201,168,76,.3)}
  .mockup-wrap{width:100%;aspect-ratio:1/1;overflow:hidden}
  .mockup-wrap svg{width:100%;height:100%;display:block}
  .card-label{padding:14px 16px;font-size:.75rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:rgba(201,168,76,.7);border-top:1px solid rgba(201,168,76,.08)}
  @media(max-width:800px){.row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
